name: Create New Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
  SECRET_ID: ${{ secrets.SECRET_ID }}

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'true'
      
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Verify Xcode Version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Clean Build Environment
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Verify CI secret wiring
        run: |
          if [ -n "$CLIENT_SECRET" ]; then
            echo "CLIENT_SECRET is set (masked)"
          else
            echo "CLIENT_SECRET is missing"
          fi

          if [ -n "$SECRET_ID" ]; then
            echo "SECRET_ID is set (masked)"
          else
            echo "SECRET_ID is missing"
          fi

      - name: Resolve Package Dependencies
        run: |
          xcodebuild -project Tools-Kit.xcodeproj \
            -scheme Tools-Kit \
            -resolvePackageDependencies

      - name: Swift build (env check)
        run: |
          echo "Skipping swift build - this is an iOS-only package that cannot be built with SwiftPM on macOS/Linux."
          echo "The package will be built using xcodebuild with the iOS SDK instead."

      # ✅ FIXED BUILD STEP
      - name: Compile and Build .ipa
        run: |
          set -e

          mkdir -p upload

          xcodebuild \
            -project Tools-Kit.xcodeproj \
            -scheme Tools-Kit \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -archivePath upload/Tools-Kit.xcarchive \
            archive \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

          echo "==== ARCHIVE CONTENTS ===="
          ls -R upload/Tools-Kit.xcarchive

          APP_PATH=$(find upload/Tools-Kit.xcarchive -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app found in archive"
            exit 1
          fi

          echo "Using app: $APP_PATH"

          # 🔑 CRITICAL: remove broken signing artifacts
          rm -rf "$APP_PATH/_CodeSignature" || true
          rm -rf "$APP_PATH/CodeResources" || true

          if [ -d "$APP_PATH/Frameworks" ]; then
            find "$APP_PATH/Frameworks" -name "_CodeSignature" -type d -exec rm -rf {} + || true
          fi

          mkdir -p upload/Payload
          cp -R "$APP_PATH" upload/Payload/

          cd upload
          zip -r Tools-Kit.ipa Payload

      - name: Verify IPA
        run: |
          ls -la upload/
          unzip -l upload/Tools-Kit.ipa

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Tools-Kit Build ${{ github.run_number }}
          files: upload/Tools-Kit.ipa
          generate_release_notes: true
