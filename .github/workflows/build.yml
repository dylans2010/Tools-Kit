name: Create New Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
  SECRET_ID: ${{ secrets.SECRET_ID }}

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'true'
      
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Clean DerivedData
        run: rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Resolve Dependencies
        run: |
          xcodebuild -project Tools-Kit.xcodeproj \
            -scheme Tools-Kit \
            -resolvePackageDependencies

      # ✅ CRITICAL FIX: build instead of archive
      - name: Build App (Clean Unsigned)
        run: |
          set -e

          OUTPUT_DIR=$(pwd)/upload/output
          mkdir -p "$OUTPUT_DIR"

          xcodebuild \
            -project Tools-Kit.xcodeproj \
            -scheme Tools-Kit \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CONFIGURATION_BUILD_DIR="$OUTPUT_DIR"

      - name: Locate .app
        run: |
          set -e

          APP_PATH=$(find upload/output -maxdepth 1 -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            ls -R upload/output
            exit 1
          fi

          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Create IPA
        run: |
          set -e

          mkdir -p upload/Payload
          cp -R "$APP_PATH" upload/Payload/

          cd upload
          zip -r Tools-Kit.ipa Payload

      - name: Verify IPA
        run: |
          unzip -l upload/Tools-Kit.ipa

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Tools-Kit Build ${{ github.run_number }}
          files: upload/Tools-Kit.ipa
          generate_release_notes: true