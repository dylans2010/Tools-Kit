name: Build Tools Kit

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Verify Xcode Version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Clean DerivedData
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Resolve Dependencies
        run: |
          xcodebuild -project Tools-Kit.xcodeproj -scheme Test -resolvePackageDependencies

      - name: Build App (Unsigned, Deterministic Output)
        run: |
          set -e

          OUTPUT_DIR=$(pwd)/build/output
          mkdir -p "$OUTPUT_DIR"

          xcodebuild \
            -project Tools-Kit.xcodeproj \
            -scheme Test \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CONFIGURATION_BUILD_DIR="$OUTPUT_DIR"

      - name: Locate .app
        run: |
          set -e

          APP_PATH=$(find build/output -maxdepth 1 -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            ls -R build/output
            exit 1
          fi

          echo "Found app at: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Create IPA (Proper Payload Structure)
        run: |
          set -e

          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/

          cd build
          zip -r Tools-Kit.ipa Payload

      - name: Verify IPA
        run: |
          unzip -l build/Tools-Kit.ipa

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Tools Kit Build ${{ github.run_number }}
          files: build/Tools-Kit.ipa
          generate_release_notes: true