name: Create New Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
  SECRET_ID: ${{ secrets.SECRET_ID }}

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'true'
      
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Clean DerivedData
        run: rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Resolve Dependencies
        run: |
          xcodebuild -project Tools-Kit.xcodeproj \
            -scheme Tools-Kit \
            -resolvePackageDependencies

      # ✅ Keep archive, but controlled
      - name: Archive App (Unsigned)
        run: |
          set -e

          mkdir -p upload

          xcodebuild \
            -project Tools-Kit.xcodeproj \
            -scheme Tools-Kit \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -archivePath upload/Tools-Kit.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      # ✅ CRITICAL FIX: clean signing artifacts
      - name: Strip Code Signing
        run: |
          set -e

          APP_PATH=$(find upload/Tools-Kit.xcarchive -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "No app found in archive"
            exit 1
          fi

          echo "Cleaning signing data from: $APP_PATH"

          # Remove existing signatures
          rm -rf "$APP_PATH/_CodeSignature"
          rm -rf "$APP_PATH/CodeResources"

          # Clean frameworks if they exist
          if [ -d "$APP_PATH/Frameworks" ]; then
            find "$APP_PATH/Frameworks" -name "_CodeSignature" -type d -exec rm -rf {} +
          fi

          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Create IPA
        run: |
          set -e

          mkdir -p upload/Payload
          cp -R "$APP_PATH" upload/Payload/

          cd upload
          zip -r Tools-Kit.ipa Payload

      - name: Verify IPA
        run: unzip -l upload/Tools-Kit.ipa

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Tools-Kit Build ${{ github.run_number }}
          files: upload/Tools-Kit.ipa
          generate_release_notes: true