name: Build Tools Kit

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  APP_NAME: "Tools Kit"
  PROJECT: "Tools-Kit.xcodeproj"
  SCHEME: "Test"
  MARKETING_VERSION: "1.0"
  BUILD_VERSION: "1"

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-${{ hashFiles('**/*.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Build App (Unsigned)
        run: |
          set -e
          mkdir -p build

          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            PRODUCT_BUNDLE_IDENTIFIER="com.example.myapp" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_VERSION" \
            PRODUCT_NAME="$APP_NAME" \
            TARGETED_DEVICE_FAMILY="1,2"

      - name: Locate .app
        run: |
          set -e
          APP_PATH=$(find build/DerivedData -name "*.app" | grep -i "Products/Applications" | head -n 1)

          echo "Found app at: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Create IPA
        run: |
          set -e

          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/

          cd build
          zip -r "Tools-Kit.ipa" Payload

      - name: Verify IPA
        run: |
          ls -R build
          unzip -l build/Tools-Kit.ipa

      - name: Generate Release Tag
        id: tag
        run: |
          TAG="v$(date +'%Y.%m.%d.%H%M%S')"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Tools Kit Build ${{ steps.tag.outputs.tag }}"
          files: build/Tools-Kit.ipa