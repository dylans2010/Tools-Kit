name: Build Tools Kit

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  APP_NAME: "Tools Kit"
  BUNDLE_IDENTIFIER: "com.example.myapp"
  MARKETING_VERSION: "1.0"
  BUILD_VERSION: "1"

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-${{ hashFiles('**/*.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Build Archive
        run: |
          set -e
          mkdir -p upload

          xcodebuild \
            -project "Tools Kit.xcodeproj" \
            -scheme "Test" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -archivePath upload/Tools-Kit.xcarchive \
            clean archive \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_IDENTIFIER" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_VERSION" \
            PRODUCT_NAME="$APP_NAME" \
            TARGETED_DEVICE_FAMILY="1,2" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Create IPA
        run: |
          mkdir -p upload/Payload
          cp -R upload/Tools-Kit.xcarchive/Products/Applications/*.app upload/Payload/
          cd upload
          zip -r "Tools-Kit.ipa" Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tools-Kit-ipa
          path: upload/Tools-Kit.ipa

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Tools-Kit-build-logs
          path: ~/Library/Logs