name: Create New Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
  SECRET_ID: ${{ secrets.SECRET_ID }}

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'true'
      
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Verify Xcode Version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Clean Build Environment
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData


      - name: Verify CI secret wiring
        run: |
          if [ -n "$CLIENT_SECRET" ]; then
            echo "CLIENT_SECRET is set (masked)"
          else
            echo "CLIENT_SECRET is missing"
          fi

          if [ -n "$SECRET_ID" ]; then
            echo "SECRET_ID is set (masked)"
          else
            echo "SECRET_ID is missing"
          fi

      - name: Resolve Package Dependencies
        run: xcodebuild -project Tools-Kit.xcodeproj -scheme Tools-Kit -resolvePackageDependencies

      - name: Compile and Build .ipa
        run: |
          mkdir -p upload
          xcodebuild -project Tools-Kit.xcodeproj \
            -scheme Tools-Kit \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -archivePath upload/Tools-Kit.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

          mkdir -p upload/Payload
          cp -R upload/Tools-Kit.xcarchive/Products/Applications/*.app upload/Payload/
          cd upload
          zip -r Tools-Kit.ipa Payload

      - name: Verify IPA
        run: |
          ls -la upload/
          test -f upload/Tools-Kit.ipa && echo "IPA created successfully"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: SwiftCode Build ${{ github.run_number }}
          files: upload/Tools-Kit.ipa
          generate_release_notes: true
